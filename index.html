<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Weather App</title>

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Background Watermark -->
  <h1 class="bg-text">AKASH</h1>

  <!-- Main Weather Container -->
  <section class="container">

    <!-- Search Bar -->
    <div class="weather_header">

      <form class="weather_search">

        <i class="fa-solid fa-magnifying-glass"></i>

        <input
          type="text"
          class="city_name"
          placeholder="Search your city..."
        />

      </form>

    </div>

    <!-- Weather Main Section -->
    <div class="weather_body">

      <!-- City Name -->
      <h1 class="weather_city">
        Ludhiana, India
      </h1>

      <!-- Date Time -->
      <p class="weather_date_time">
        Wednesday, 15 May 2024, 09:30 AM
      </p>

      <!-- Forecast -->
      <div class="forecast_wrapper">
        <p class="weather_forecast">
          Clear Sky
        </p>
      </div>

      <!-- Weather Icon -->
      <div class="weather_icon">
        <!-- JS se image aayegi -->
      </div>

      <!-- Temperature -->
      <div class="temp_wrapper">

        <h2 class="weather_temperature">
          28
        </h2>

        <span class="degree_symbol">
          °C
        </span>

      </div>

      <!-- Min Max Temperature -->
      <div class="weather_minmax">

        <div class="min_box">
          <p class="weather_min">
            Min: 20°C
          </p>
        </div>

        <div class="max_box">
          <p class="weather_max">
            Max: 33°C
          </p>
        </div>

      </div>

    </div>

    <!-- Weather Cards -->
    <section class="weather_info">

      <!-- Feels Like -->
      <div class="weather_card">

        <div class="card_icon">
          <i class="fa-solid fa-temperature-half"></i>
        </div>

        <div class="card_text">
          <p>Feels Like</p>

          <p class="weather_feelsLike">
            29°C
          </p>
        </div>

      </div>

      <!-- Humidity -->
      <div class="weather_card">

        <div class="card_icon">
          <i class="fa-solid fa-droplet"></i>
        </div>

        <div class="card_text">
          <p>Humidity</p>

          <p class="weather_humidity">
            45%
          </p>
        </div>

      </div>

      <!-- Wind -->
      <div class="weather_card">

        <div class="card_icon">
          <i class="fa-solid fa-wind"></i>
        </div>

        <div class="card_text">
          <p>Wind</p>

          <p class="weather_wind">
            12 m/s
          </p>
        </div>

      </div>

      <!-- Pressure -->
      <div class="weather_card">

        <div class="card_icon">
          <i class="fa-solid fa-gauge-high"></i>
        </div>

        <div class="card_text">
          <p>Pressure</p>

          <p class="weather_pressure">
            1012 hPa
          </p>
        </div>

      </div>

    </section>

    <!-- Footer -->
    <div class="footer_text">
      <p>Made with ❤️ by Akash</p>
    </div>

  </section>

  <!-- JS -->
  <script src="./main.js"></script>

</body>
</html>
