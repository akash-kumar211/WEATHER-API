<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />

    <title>Weather App</title>
  </head>

  <body>

    <!-- Background Watermark -->
    <h1 class="bg-text">AKASH</h1>

    <section class="container">

      <!-- Search Section -->
      <div class="weather_header">
        <form class="weather_search">

          <i class="fa-solid fa-magnifying-glass"></i>

          <input
            type="text"
            class="city_name"
            placeholder="Search your city..."
          />

        </form>
      </div>

      <!-- Weather Main Data -->
      <div class="weather_body">

        <h1 class="weather_city"></h1>

        <p class="weather_date_time"></p>

        <div class="weather_data">

          <p class="weather_forecast"></p>

          <div class="weather_icon"></div>

        </div>

        <p class="weather_temperature"></p>

        <div class="weather_minmax">
          <p class="weather_min"></p>
          <p class="weather_max"></p>
        </div>

      </div>

      <!-- Extra Weather Info -->
      <section class="weather_info">

        <div class="weather_card">
          <i class="fa-solid fa-temperature-half"></i>

          <div>
            <p>Feels Like</p>
            <p class="weather_feelsLike">15°</p>
          </div>
        </div>

        <div class="weather_card">
          <i class="fa-solid fa-droplet"></i>

          <div>
            <p>Humidity</p>
            <p class="weather_humidity">15%</p>
          </div>
        </div>

        <div class="weather_card">
          <i class="fa-solid fa-wind"></i>

          <div>
            <p>Wind</p>
            <p class="weather_wind">15 m/s</p>
          </div>
        </div>

        <div class="weather_card">
          <i class="fa-solid fa-gauge-high"></i>

          <div>
            <p>Pressure</p>
            <p class="weather_pressure">1012 hPa</p>
          </div>
        </div>

      </section>

      <!-- Footer -->
      <div class="footer_text">
        <p>Made with ❤️ by Akash</p>
      </div>

    </section>

    <!-- JS -->
    <script src="./main.js"></script>

  </body>
</html>
